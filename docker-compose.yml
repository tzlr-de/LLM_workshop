
services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:${OLLAMA_PORT:-11434}"
    volumes:
      - ${OLLAMA_MODELS_PATH:-/data/ollama/.ollama/models}:${OLLAMA_MODELS:-/root/.ollama/models}
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-localhost}:${OLLAMA_PORT:-11434}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-64000}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-/root/.ollama/models}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m0s}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - ${OPEN_WEBUI_DATA:-/data/open-webui}:/app/backend/data
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:${OLLAMA_PORT:-11434}'
      - 'WEBUI_SECRET_KEY=some_secret_key_change_in_production'
    depends_on:
      - ollama
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - ${N8N_DATA:-/data/n8n}:/home/node/.n8n
      - ${N8N_LOCAL_FILES:-./n8n-local-files}:/files
    depends_on:
      - ollama
    environment:
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-true}
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=pBcCmghUGcT
      - N8N_NATIVE_PYTHON_RUNNER=true

    restart: unless-stopped

  n8n-task-runners:
    image: n8nio/runners:latest
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=pBcCmghUGcIT
      # etc.
    depends_on:
      - n8n
